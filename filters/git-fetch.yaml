name: "git-fetch"
version: 1
description: "Condensed git fetch: new refs or ok"

match:
  command: "git"
  subcommand: "fetch"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "on_empty"
    message: "ok (no new changes)"
  - action: "head"
    n: 20
    overflow_msg: "... more refs"

on_error: "passthrough"

tests:
  - name: "empty input returns ok (no new changes)"
    input: ""
    expected: |
      ok (no new changes)
