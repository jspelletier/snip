name: "git-add"
version: 1
description: "Condensed git add: returns ok on success, shows errors"

match:
  command: "git"
  subcommand: "add"

streams:
  - stdout
  - stderr

pipeline:
  - action: "strip_ansi"
  - action: "on_empty"
    message: "ok"

on_error: "passthrough"

tests:
  - name: "empty input returns ok"
    input: ""
    expected: |
      ok
