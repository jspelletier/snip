name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug — what did you expect vs what actually happened.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `snip ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, snip version
      placeholder: |
        - OS: macOS 15.x / Ubuntu 24.04
        - snip: v0.6.1
      render: markdown
    validations:
      required: false
